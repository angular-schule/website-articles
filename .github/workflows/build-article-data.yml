name: Build article data

on:
  push:
    branches:
      - main
env:
  GITHUB_NAME: The Buildbot
  GITHUB_EMAIL: buildbot@angular2buch.de
  BRANCH: gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Build
        env:
          # standard.site publisher (see build/STANDARD-SITE.md).
          # The step is a no-op unless BSKY_APP_PASSWORD is set.
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          BSKY_HANDLE: angular.schule
          STANDARD_SITE_URL: https://angular.schule
          STANDARD_SITE_NAME: Angular.Schule
          STANDARD_SITE_DESCRIPTION: Der Blog der Angular.Schule – Tutorials und Neuigkeiten rund um Angular.
          STANDARD_SITE_EXPECTED_DID: did:plc:zfvlnrdh7cotokow5hx7czxi
          STANDARD_SITE_ICON: https://angular.schule/standard-site-icon.png
        run: |
          cd build
          npm install
          npm run build

      - name: Deploy to branch
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install angular-cli-ghpages@2
          npx angular-cli-ghpages --no-notfound --dir=dist --branch="$BRANCH" --name="$GITHUB_NAME" --email="$GITHUB_EMAIL"
